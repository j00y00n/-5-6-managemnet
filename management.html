<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>2026 수업 매니저 (최종 연동판)</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; margin-bottom: 300px; }
    h1 { text-align: center; color: #1a73e8; }
    .container { max-width: 1900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; table-layout: fixed; }
    th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; position: relative; }
    th { background-color: #f8f9fa; }
    
    .name-input, .day-input { width: 90%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 3px; font-size: 11px; }
    .date-input { width: 95%; margin-bottom: 4px; border: 1px solid #ccc; border-radius: 3px; text-align: center; font-size: 11px; }
    .memo-input { width: 95%; border: 1px solid #eee; border-radius: 3px; height: 35px; font-size: 11px; resize: none; }
    .status-btn { width: 100%; padding: 5px 0; cursor: pointer; border: none; border-radius: 3px; font-size: 10px; font-weight: bold; margin-top: 3px; }
    .stats-badge { font-size: 10px; padding: 2px; border-radius: 3px; margin-bottom: 2px; font-weight: bold; }
    
    .state-0 { background-color: #e9ecef; color: #495057; }
    .state-1 { background-color: #007bff; color: white; }
    .state-2 { background-color: #dc3545; color: white; }
    
    .dashboard-container { display: flex; gap: 20px; margin-top: 50px; justify-content: center; }
    .dash-cal { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-top: 10px; background: #eee; border: 1px solid #eee; }
    .cal-date { height: 45px; background: white; position: relative; padding: 2px; }
    .dot-container { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 5px; }
    .class-dot { width: 6px; height: 6px; background: #1a73e8; border-radius: 50%; display: inline-block; }
    .makeup-dot { background: #007bff; border: 1px solid #fff; } /* 보강 점은 조금 더 강조 */
    .cal-popover { visibility: hidden; opacity: 0; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); width: 120px; background: rgba(0,0,0,0.85); color: white; padding: 8px; border-radius: 6px; font-size: 11px; z-index: 100; transition: opacity 0.2s; pointer-events: none; }
    .cal-date:hover .cal-popover { visibility: visible; opacity: 1; }

    #commonModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
    .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    #makeup-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
    .makeup-cell { height: 65px; border: 1px solid #eee; border-radius: 4px; position: relative; background: white; cursor: pointer; transition: 0.2s; }
    .makeup-cell.missed { border: 2px solid #dc3545 !important; background: #fff5f5; }
    .makeup-cell.x-marked { border: 1px solid #eee !important; background: #fff; }
    .makeup-cell.fixed-missed { border: 2px dashed #dc3545 !important; background: #fff5f5; opacity: 0.6; }
    .makeup-cell.makeup-target { border: 2px solid #007bff !important; background: #f0f7ff; }
    #makeup-wrapper { position: relative; background: #fff; padding: 10px; border: 1px solid #ddd; }
    #arrowCanvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }

    .x-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #dc3545; font-size: 20px; font-weight: bold; pointer-events: none; }
    .complete-check { position: absolute; bottom: 2px; right: 2px; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <h1>🗓️ 2026 수업 매니저</h1>
  <table>
    <thead><tr id="headerRow"></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="dashboard-container">
    <div class="dash-cal"><h3>5월</h3><div class="cal-grid" id="grid-may"></div></div>
    <div class="dash-cal"><h3>6월</h3><div class="cal-grid" id="grid-june"></div></div>
  </div>
</div>

<div id="commonModal">
  <div class="modal-content" id="modalInner"></div>
</div>

<script>
  const may2026 = { '일': [3, 10, 17, 24, 31], '월': [4, 11, 18, 25], '화': [5, 12, 19, 26], '수': [6, 13, 20, 27], '목': [7, 14, 21, 28], '금': [1, 8, 15, 22, 29], '토': [2, 9, 16, 23, 30] };
  
  let db = JSON.parse(localStorage.getItem('classManagerDB')) || Array.from({ length: 10 }, (_, i) => ({
    name: `학생${i+1}`, days: '', sessions: Array(9).fill(0),
    dates: Array(9).fill(''), memos: Array(9).fill(''), longMemo: '', makeupArrows: [], makeupX: []
  }));

  function saveDB() {
    localStorage.setItem('classManagerDB', JSON.stringify(db));
    renderDashboard();
  }

  function init() {
    const headerRow = document.getElementById('headerRow');
    headerRow.innerHTML = '<th>학생 정보</th>' + Array.from({length:9}, (_, i)=>`<th>${i+1}회</th>`).join('') + '<th>보강 관리</th><th>종합 메모</th>';

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    db.forEach((student, i) => {
      const tr = document.createElement('tr');
      let html = `<td class="config-cell">
        <input type="text" class="name-input" value="${student.name}" oninput="db[${i}].name=this.value; saveDB();">
        <input type="text" class="day-input" value="${student.days || ''}" placeholder="요일" onchange="handleAutoFill(${i}, this.value, 'days')">
      </td>`;

      for (let j = 0; j < 9; j++) {
        html += `<td>
          <input type="text" class="date-input" value="${student.dates[j]}" oninput="db[${i}].dates[${j}]=this.value; saveDB();">
          <textarea class="memo-input" oninput="db[${i}].memos[${j}]=this.value; saveDB();">${student.memos[j]}</textarea>
          <button class="status-btn state-${student.sessions[j]}" onclick="toggleState(${i}, ${j})">${student.sessions[j]==0?'대기':student.sessions[j]==1?'완료':'결강'}</button>
        </td>`;
      }

      const miss = student.sessions.filter(s => s === 2).length;
      const arrowCount = (student.makeupArrows || []).length;
      const xCount = (student.makeupX || []).length;
      const totalMakeup = arrowCount + xCount;
      const isComplete = (miss > 0 && miss === totalMakeup);

      html += `<td style="position:relative;">
        <div class="stats-badge state-2">결강: ${miss}</div>
        <div class="stats-badge state-1">보강: ${totalMakeup}</div>
        <button class="status-btn state-0" style="background:#444; color:white;" onclick="openMakeupModal(${i})">보강 설정</button>
        ${isComplete ? '<span class="complete-check">✅</span>' : ''}
      </td>
      <td><textarea class="memo-input" style="height:60px;" oninput="db[${i}].longMemo=this.value; saveDB();">${student.longMemo || ''}</textarea></td>`;
      tr.innerHTML = html;
      tbody.appendChild(tr);
    });
    renderDashboard();
  }

  function toggleState(sIdx, sessIdx) {
    db[sIdx].sessions[sessIdx] = (db[sIdx].sessions[sessIdx] + 1) % 3;
    saveDB(); init();
  }

  /* 메인 대시보드 렌더링 로직 (보강 데이터 계산 포함) */
  function renderDashboard() {
    const gridMay = document.getElementById('grid-may');
    const gridJune = document.getElementById('grid-june');
    if(!gridMay || !gridJune) return;
    gridMay.innerHTML = gridJune.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(day => {
      const label = `<div style="font-weight:bold; font-size:11px; padding:5px; background:#f8f9fa; text-align:center;">${day}</div>`;
      gridMay.innerHTML += label; gridJune.innerHTML += label;
    });
    for(let i=0; i<5; i++) gridMay.innerHTML += '<div></div>';
    for(let d=1; d<=31; d++) gridMay.innerHTML += createDotCell(`05.${d.toString().padStart(2, '0')}`, d);
    for(let i=0; i<1; i++) gridJune.innerHTML += '<div></div>';
    for(let d=1; d<=30; d++) gridJune.innerHTML += createDotCell(`06.${d.toString().padStart(2, '0')}`, d);
  }

  function createDotCell(dateStr, dayNum) {
    let finalClasses = [];

    db.forEach(s => {
      // 1. 기본 수업 날짜 중 X 표시되거나 다른 날로 보강된 날 제외
      s.dates.forEach((d, idx) => {
        if(d === dateStr) {
          const isX = (s.makeupX || []).includes(dateStr);
          const isMoved = (s.makeupArrows || []).some(a => a.from === dateStr);
          // X 표시도 아니고, 다른 곳으로 옮겨지지도 않은 경우만 표시
          if(!isX && !isMoved) {
            finalClasses.push({ name: s.name, time: s.memos[idx], type: 'normal' });
          }
        }
      });

      // 2. 이 날짜로 보강 화살표가 온 경우 추가
      (s.makeupArrows || []).forEach(a => {
        if(a.to === dateStr) {
          finalClasses.push({ name: s.name, time: '보강', type: 'makeup' });
        }
      });
    });

    let dots = finalClasses.map(c => `<span class="class-dot ${c.type==='makeup' ? 'makeup-dot' : ''}"></span>`).join('');
    let popoverContent = finalClasses.length > 0 ? finalClasses.map(c => `• ${c.name} (${c.time || '미정'})`).join('<br>') : '수업 없음';
    
    return `<div class="cal-date">
      <span style="font-size:10px; color:#ccc;">${dayNum}</span>
      <div class="dot-container">${dots}</div>
      <div class="cal-popover">${popoverContent}</div>
    </div>`;
  }

  let currentDragSource = null;

  function openMakeupModal(idx) {
    const modal = document.getElementById('commonModal');
    const inner = document.getElementById('modalInner');
    inner.innerHTML = `
      <h3 style="margin:0 0 10px 0;">${db[idx].name} 보강 설정</h3>
      <p style="font-size:11px; color:#666; margin-bottom:10px;">• 연결: 빨간 테두리를 드래그하여 보강일에 놓으세요.<br>• 취소: 빨간 테두리를 <b>클릭</b>하면 X 표시(일정에서 제거)가 됩니다.</p>
      <div id="makeup-wrapper">
        <canvas id="arrowCanvas"></canvas>
        <div id="makeup-grid"></div>
      </div>
      <div style="text-align:right; margin-top:20px;">
        <button class="status-btn state-2" style="width:100px; display:inline-block;" onclick="resetMakeup(${idx})">초기화</button>
        <button class="status-btn state-0" style="width:80px; display:inline-block; background: #666; color:white;" onclick="closeModal()">닫기</button>
      </div>
    `;
    modal.style.display = 'block';
    renderMakeupGrid(idx);
    setTimeout(() => drawArrows(idx), 50);
  }

  function closeModal() {
    document.getElementById('commonModal').style.display = 'none';
    init();
  }

  function resetMakeup(idx) {
    db[idx].makeupArrows = [];
    db[idx].makeupX = [];
    saveDB();
    renderMakeupGrid(idx);
    drawArrows(idx);
  }

  function renderMakeupGrid(sIdx) {
    const grid = document.getElementById('makeup-grid');
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div style="text-align:center; font-weight:bold; font-size:11px;">${d}</div>`);
    for(let i=0; i<5; i++) grid.innerHTML += '<div></div>';
    
    const fromDates = (db[sIdx].makeupArrows || []).map(a => a.from);
    const toDates = (db[sIdx].makeupArrows || []).map(a => a.to);
    const xDates = (db[sIdx].makeupX || []);

    for(let d=1; d<=31; d++) {
      const dateStr = `05.${d.toString().padStart(2, '0')}`;
      const isMiss = db[sIdx].dates.some((date, i) => date === dateStr && db[sIdx].sessions[i] === 2);
      const cell = document.createElement('div');
      cell.id = `mc-${dateStr}`;
      
      let statusClass = '';
      if (isMiss) {
        if (xDates.includes(dateStr)) statusClass = 'x-marked';
        else statusClass = fromDates.includes(dateStr) ? 'fixed-missed' : 'missed';
      } else if (toDates.includes(dateStr)) {
        statusClass = 'makeup-target';
      }
      
      cell.className = `makeup-cell ${statusClass}`;
      cell.innerHTML = `<span style="padding:5px; font-size:10px; font-weight:bold;">${d}</span>`;
      
      if (isMiss && xDates.includes(dateStr)) {
        cell.innerHTML += `<span class="x-icon">✕</span>`;
      }
      
      if(isMiss) {
        cell.onclick = (e) => {
          if (!db[sIdx].makeupX) db[sIdx].makeupX = [];
          db[sIdx].makeupArrows = db[sIdx].makeupArrows.filter(a => a.from !== dateStr);
          const xIdx = db[sIdx].makeupX.indexOf(dateStr);
          if (xIdx > -1) db[sIdx].makeupX.splice(xIdx, 1);
          else db[sIdx].makeupX.push(dateStr);
          saveDB();
          renderMakeupGrid(sIdx);
          drawArrows(sIdx);
        };
        cell.draggable = true;
        cell.ondragstart = (e) => { currentDragSource = dateStr; e.dataTransfer.setData('text', dateStr); };
      }

      cell.ondragover = (e) => e.preventDefault();
      cell.ondrop = (e) => {
        e.preventDefault();
        if(currentDragSource && currentDragSource !== dateStr) {
          if(!db[sIdx].makeupArrows) db[sIdx].makeupArrows = [];
          if(db[sIdx].makeupX) db[sIdx].makeupX = db[sIdx].makeupX.filter(x => x !== currentDragSource);
          db[sIdx].makeupArrows.push({ from: currentDragSource, to: dateStr });
          saveDB();
          renderMakeupGrid(sIdx);
          setTimeout(() => drawArrows(sIdx), 10);
        }
        currentDragSource = null;
      };
      grid.appendChild(cell);
    }
  }

  function drawArrows(sIdx) {
    const canvas = document.getElementById('arrowCanvas');
    const wrapper = document.getElementById('makeup-wrapper');
    if(!canvas || !wrapper) return;
    canvas.width = wrapper.offsetWidth;
    canvas.height = wrapper.offsetHeight;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    (db[sIdx].makeupArrows || []).forEach(arrow => {
      const fromEl = document.getElementById(`mc-${arrow.from}`);
      const toEl = document.getElementById(`mc-${arrow.to}`);
      if(fromEl && toEl) {
        const fx = fromEl.offsetLeft + fromEl.offsetWidth/2;
        const fy = fromEl.offsetTop + fromEl.offsetHeight/2;
        const tx = toEl.offsetLeft + toEl.offsetWidth/2;
        const ty = toEl.offsetTop + toEl.offsetHeight/2;
        ctx.beginPath(); ctx.setLineDash([5, 4]); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty);
        ctx.strokeStyle = '#dc3545'; ctx.lineWidth = 2; ctx.stroke();
        const angle = Math.atan2(ty - fy, tx - fx);
        ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(tx, ty);
        ctx.lineTo(tx - 12*Math.cos(angle-Math.PI/6), ty - 12*Math.sin(angle-Math.PI/6));
        ctx.lineTo(tx - 12*Math.cos(angle+Math.PI/6), ty - 12*Math.sin(angle+Math.PI/6));
        ctx.closePath(); ctx.fillStyle = '#dc3545'; ctx.fill();
      }
    });
  }

  function handleAutoFill(idx, value, type) {
    db[idx][type] = value;
    if (type === 'days') {
      const targetDays = value.replace(/\s/g, '').split(/[,/.]/);
      let dates = [];
      targetDays.forEach(d => { if (may2026[d]) may2026[d].forEach(date => dates.push({num: date})); });
      dates.sort((a, b) => a.num - b.num);
      for (let j = 0; j < 9; j++) if (dates[j]) db[idx].dates[j] = `05.${dates[j].num.toString().padStart(2, '0')}`;
    }
    saveDB(); init();
  }

  window.onload = init;
</script>
</body>
</html>
